<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escape Challenge - Leaderboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="utils.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #020617 0%, #0f172a 100%);
            min-height: 100vh;
            color: white;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .rank-1 { background: linear-gradient(45deg, #FFD700, #FFA500); }
        .rank-2 { background: linear-gradient(45deg, #C0C0C0, #A0A0A0); }
        .rank-3 { background: linear-gradient(45deg, #CD7F32, #8B4513); }
    </style>
</head>
<body class="p-8">
    <div class="container mx-auto max-w-4xl">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold mb-2">
                <span class="bg-clip-text text-transparent bg-gradient-to-r from-yellow-400 to-orange-500">🏆 GLOBAL</span>
                <span class="bg-clip-text text-transparent bg-gradient-to-r from-orange-500 to-red-500">LEADERBOARD</span>
            </h1>
            <p class="text-slate-400">Peringkat pemain terbaik sepanjang masa</p>
        </div>
        
        <div class="glass rounded-3xl p-6 mb-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold">Top Players</h2>
                <button onclick="window.location.href='start.html'" 
                        class="bg-indigo-600 hover:bg-indigo-500 px-4 py-2 rounded-xl text-sm">
                    ← Kembali
                </button>
            </div>
            
            <div id="leaderboardList" class="space-y-2">
                <!-- Loading -->
                <div class="text-center py-8 text-slate-500">
                    <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-indigo-500 border-t-transparent mb-2"></div>
                    <p>Memuat leaderboard...</p>
                </div>
            </div>
        </div>
        
        <div class="text-center text-xs text-slate-500">
            <p>Data diperbarui secara real-time</p>
        </div>
    </div>
    
    <script>
        async function loadLeaderboard() {
            try {
                const data = await gameDB.getGlobalLeaderboard(20)
                const container = document.getElementById('leaderboardList')
                
                if (data.length === 0) {
                    container.innerHTML = '<div class="text-center py-8 text-slate-500">Belum ada data</div>'
                    return
                }
                
                container.innerHTML = data.map((player, index) => `
                    <div class="glass p-4 rounded-xl flex items-center gap-4 transform hover:scale-102 transition">
                        <div class="w-8 h-8 rounded-full flex items-center justify-center font-bold 
                            ${index === 0 ? 'rank-1' : index === 1 ? 'rank-2' : index === 2 ? 'rank-3' : 'bg-slate-700'}">
                            #${index + 1}
                        </div>
                        <div class="text-3xl">${player.player_emoji || '👤'}</div>
                        <div class="flex-1">
                            <div class="font-bold">${player.player_name}</div>
                            <div class="text-xs text-slate-400">Bergabung: ${new Date(player.created_at).toLocaleDateString('id-ID')}</div>
                        </div>
                        <div class="text-right">
                            <div class="text-2xl font-bold text-indigo-400">${player.total_wins}</div>
                            <div class="text-xs text-slate-400">dari ${player.total_games} game</div>
                        </div>
                    </div>
                `).join('')
                
            } catch (error) {
                console.error('Error loading leaderboard:', error)
                document.getElementById('leaderboardList').innerHTML = 
                    '<div class="text-center py-8 text-red-400">Gagal memuat leaderboard</div>'
            }
        }
        
        loadLeaderboard()
        
        // Refresh setiap 30 detik
        setInterval(loadLeaderboard, 30000)
    </script>
</body>
</html>
